name: Frontend Docker Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ratatouille-fe:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:5050
            INTERNAL_API_BASE_URL=http://localhost:5050
            NEXTAUTH_URL=http://localhost:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ratatouille-fe:ci
          format: table
          output: trivy-image-results.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload frontend Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-image-report
          path: trivy-image-results.txt
